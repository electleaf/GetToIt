name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/GetToIt.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GetToIt-apk
          path: client/android/app/build/outputs/apk/debug/GetToIt.apk
          if-no-files-found: error

      - name: Publish APK to a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: GetToIt Android (latest)
          body: |
            Latest debug build of the GetToIt Android app.

            Download `GetToIt.apk` below and install it on your device
            (you may need to allow "Install from unknown sources").
            The app stores tasks on-device and works fully offline.
          files: client/android/app/build/outputs/apk/debug/GetToIt.apk
