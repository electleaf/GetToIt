services:
  postgres:
    image: postgres:16-alpine
    container_name: gettoit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gettoit
      POSTGRES_PASSWORD: gettoit
      POSTGRES_DB: gettoit
    ports:
      - "5432:5432"
    volumes:
      - gettoit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gettoit -d gettoit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gettoit_pgdata:
